<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Create Account</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="background-glow"></div>

<div class="container">

<h1>Create Account</h1>

<p class="subtitle">
Welcome to Narrate.
</p>

<input id="username" class="input" type="text" placeholder="Username">

<input id="email" class="input" type="email" placeholder="Email">

<input id="password" class="input" type="password" placeholder="Password">

<input id="confirmPassword" class="input" type="password" placeholder="Confirm Password">

<input id="referral" class="input" type="text" placeholder="Referral Code (Optional)">

<button id="createBtn" class="primary">
Create Account
</button>

<button class="wallet">

Continue with Wallet

</button>

<p class="bottom-link">

Already have an account?

<a href="index.html">

Sign In

</a>

</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/signup.js"></script>

</body>

</html>
